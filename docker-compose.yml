services:
  postgres:
    image: postgres:15
    container_name: api-sec-postgres
    environment:
      POSTGRES_USER: secuser
      POSTGRES_PASSWORD: secpass
      POSTGRES_DB: apisec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema in ./migrations is applied automatically on first init.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secuser -d apisec"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
